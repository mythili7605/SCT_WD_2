<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stopwatch</title>
    <!-- Google Fonts for futuristic timer and sleek UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-decor">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
</div>

<div class="container">
    <header>
        <h1>STOPWATCH</h1>
        <div class="glow-indicator"></div>
    </header>

    <div class="display-container">
        <div id="display">00:00:00</div>
    </div>

    <div class="buttons">
        <button id="start" title="Start">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <span>Start</span>
        </button>
        <button id="pause" title="Pause">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
            <span>Pause</span>
        </button>
        <button id="lap" title="Lap">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>Lap</span>
        </button>
        <button id="reset" title="Reset">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
            </svg>
            <span>Reset</span>
        </button>
    </div>

    <div class="laps-container">
        <div class="laps-header">
            <span>Lap</span>
            <span>Split Time</span>
        </div>
        <ul id="laps"></ul>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
